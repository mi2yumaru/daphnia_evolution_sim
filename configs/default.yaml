simulation:
  steps: 1000
  random_seed: 42
  output_csv: "results/log.csv"
  population_plot: "results/population.png"
  energy_plot: "results/average_energy.png"
  average_age_plot: "results/average_age.png"
  birth_count_plot: "results/birth_count.png"
  death_count_plot: "results/death_count.png"
  behavior_traits_plot: "results/behavior_traits.png"
  move_rate_plot: "results/move_rate.png"
  eat_rate_plot: "results/eat_rate.png"
  behavior_trait_std_plot: "results/behavior_trait_std.png"
  movement_and_eating_rates_plot: "results/movement_and_eating_rates.png"
  eat_per_move_plot: "results/eat_per_move.png"
  birth_death_rates_plot: "results/birth_death_rates.png"

environment:
  width: 100
  height: 100
  mode: "patch"            # 食料再生成モード: "random" または "patch"
  patch_count: 9
  patch_layout: "spread"    # "random" | "radial" | "spread"
  patch_radius: 5
  patch_density: 0.8
  outside_respawn_fraction: 0.05  # パッチ外での低確率リポップ割合（patch モード時）
  patch_radial_fraction: 0.25    # 'radial' レイアウト時の中心円の半径割合（短辺に対する比率）
  patch_spread_use_corners: false # 'spread' レイアウトで角(0,0),(0,H),(W,0),(W,H)を距離計算に含めるか
  patch_spread_step: 0          # spread レイアウトでの探索候補間隔(0=自動)
  initial_food_count: 500
  food_respawn_rate: 0.02
  food_energy: 5

behavior:
  low_energy_threshold_ratio: 0.5
  food_detection_range: 1
  site_memory_steps: 20

  # 自分のいるマスに餌があるとき、移動しない候補に加える重み
  current_cell_food_weight: 8.0

  # 周囲方向に餌があるとき、その方向に加える重み
  nearby_food_weight: 4.0

  # 最後に餌を食べた場所へ近づく方向に加える重み
  site_memory_weight: 2.0

organism:
  initial_population: 100
  initial_energy: 10
  move_cost: 1.0
  living_cost: 0.1
  reproduction_threshold: 20
  reproduction_cost: 10
  offspring_energy: 5

  # 初期個体の年齢を 0 ～ max_age-1 の範囲でランダム化するか
  randomize_initial_age: false

  max_age: 200
  move_type: "moore"  # moore(8) or von_neumann(4)

genetics:
  genome_length: 20
  mutation_rate: 0.01
  recombination_rate: 0.0

environment_change:
  enabled: false
  period: 200

visualization:
  enabled: true
  interval_ms: 100
  show_food: true
  show_organisms: true
  save_animation: false
  animation_path: "results/simulation.gif"
  save_video: false
  video_path: "results/simulation.mp4"
